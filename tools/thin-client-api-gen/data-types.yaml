# Curated Go return/parameter structs rendered as a field reference at
# the <!-- DATA_TYPES_TABLE --> placeholder (see overlay/82-data-types.md).
#
# The Go reference structs in katzenpost/client/thin are authoritative.
# The Rust and Python bindings return the same data under their own
# result types with snake_case field names (e.g. WriteCap -> write_cap).
#
# Each entry is a struct name, optionally with a friendlier title and a
# clarifying note. Only structs that live in client/thin can be resolved
# (that is the only tree the Go extractor walks).

