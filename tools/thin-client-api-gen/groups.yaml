  go:     "ThinClient.NewMessageID"
  rust:   "ThinClient::new_message_id"
  python: "ThinClient.new_message_id"

- group: new_surb_id
  section: "Utility"
  title: "NewSURBID / new_surb_id"
  summary: |
    Returns a new random SURB ID for correlating message replies.
  go:     "ThinClient.NewSURBID"
  rust:   "ThinClient::new_surb_id"
  python: "ThinClient.new_surb_id"

- group: new_query_id
  section: "Utility"
  title: "NewQueryID / new_query_id"
  summary: |
    Returns a new random query ID for correlating requests and replies
    within the thin client protocol.
  go:     "ThinClient.NewQueryID"
  rust:   "ThinClient::new_query_id"
  python: "ThinClient.new_query_id"
